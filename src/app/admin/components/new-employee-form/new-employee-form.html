<div class="p-8 grow space-y-8 overflow-y-auto">
  <div>
    <div class="space-y-2">
      <label class="font-bold block mb-2">Nombre
        Completo</label>
      <input [formField]="f.name" autocomplete="off"
             class="w-full px-4 py-3 border-2 rounded-md border-green-300"
             placeholder="e.g. John Doe" type="text"/>
    </div>

    <div class="flex-auto">
      <label for="scheduleStart" class="font-bold block mb-2"> Hora de Entrada </label>
      <p-datePicker inputId="scheduleStart" [ngModel]="f.scheduleStart" (ngModelChange)="onChangeScheduleStart($event)" [timeOnly]="true"/>
    </div>

    <div class="flex-auto">
      <label for="scheduleEnd" class="font-bold block mb-2"> Hora de Salida </label>
      <p-datePicker inputId="scheduleEnd" [ngModel]="f.scheduleEnd" (ngModelChange)="onChangeScheduleEnd($event)" [timeOnly]="true"/>
    </div>

    <div class="space-y-2">
      <label class="font-bold block mb-2">Minutos de
        tolerancia</label>
      <input [formField]="f.lateTolerance" autocomplete="off"
             class="w-full px-4 py-3 border-2 rounded-md border-green-300"
             type="number"/>
    </div>
  </div>
  <div class="flex flex-col space-y-2">
    <p-button label="Guardar Empleado" class="w-max" (click)="onSubmit($event)">
    </p-button>
    <p-button label="Cancelar" class="w-max" severity="danger" variant="outlined" (click)="onCancelClick()">
    </p-button>
  </div>
</div>
