<section class="p-4 bg-gray-50">
  <div class="card bg-white p-6 rounded-xl shadow-sm border border-gray-200">
    <section class="px-2 md:px-4 py-2 max-w-container-max mx-auto">
      <p-toast/>
      <p-confirmDialog/>
      <!-- Header Section -->
      <div class="flex items-center justify-between my-2">
        <h2 class="font-semibold text-xl mb-4">Directorio de Empleados</h2>
        <div>
          <p-drawer [(visible)]="visible" header="Agregar Nuevo Empleado" position="right">
            <app-new-employee-form (created)="onEmployeeCreated()" (cancel)="onCancel()"/>
          </p-drawer>
          <p-button label="Nuevo Empleado" icon="pi pi-plus" variant="outlined" (click)="visible.set(true)">
          </p-button>
        </div>
      </div>
      <!-- Table Section -->
      <div class="overflow-x-auto">
        <p-table
          [value]="employees()"
          [paginator]="true"
          [rows]="10"
          [tableStyle]="{ 'min-width': '52rem' }"
          [showGridlines]="true"
          dataKey="employee.id"
        >
          <ng-template pTemplate="header">
            <tr class="font-bold">
              <th pSortableColumn="name">Nombre del Empleado
                <p-sortIcon field="name"/>
              </th>
              <th>Código ID</th>
              <th>Fecha Creación</th>
              <th pSortableColumn="is_active">Estado
                <p-sortIcon field="is_active"/>
              </th>
              <th>Acciones</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-emp>
            <tr>
              <td class="flex items-center gap-2 h-16">
                <p-avatar shape="circle" size="normal"
                          image="https://ui-avatars.com/api/?name={{emp.name}}&background=fff8ef&color=1d1b16"></p-avatar>
                <span>{{ emp.name }}</span>
              </td>
              <td>{{ emp.code }}</td>
              <td class="w-40">{{ emp.created_at | date:'mediumDate' }}</td>
              <td class="w-28">
              <span class="px-3 py-1 rounded-full font-label-bold text-[10px] uppercase tracking-tighter"
                    [class.bg-green-100]="emp.is_active" [class.text-green-800]="emp.is_active"
                    [class.bg-surface-container-highest]="!emp.is_active"
                    [class.text-secondary]="!emp.is_active">{{ emp.is_active ? 'Activo' : 'Inactivo' }}</span>
              </td>
              <td class="w-32">
                <div class="flex flex-wrap gap-2">
                  <p-button size="small" icon="pi pi-pencil" [rounded]="true" [outlined]="true"
                            (click)="showDialog(emp)"></p-button>
                  @if (emp.is_active === 1) {
                    <p-button size="small" icon="pi pi-trash" severity="danger" [rounded]="true"
                              [outlined]="true"
                              (click)="deleteEmployee(emp.id)"></p-button>
                  }
                </div>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </div>
    </section>
    <p-dialog header="Editar Empleado" [modal]="true" [(visible)]="visibleDialog">
      <form [formGroup]="form" class="p-4 md:p-8 grow space-y-6 md:space-y-8 overflow-y-auto">
        <div>
          <div class="space-y-2">
            <label class="font-bold block mb-2">Nombre
              Completo</label>
            <input pInputText formControlName="name" autocomplete="off"
                   type="text" class="w-full"/>
          </div>

          <div class="flex-auto mt-4">
            <label for="scheduleStart" class="font-bold block mb-2"> Hora de Entrada </label>
            <p-datePicker inputId="scheduleStart" formControlName="schedule_start" [timeOnly]="true"/>
          </div>

          <div class="flex-auto mt-4">
            <label for="scheduleEnd" class="font-bold block mb-2"> Hora de Salida </label>
            <p-datePicker inputId="scheduleEnd" formControlName="schedule_end" [timeOnly]="true"/>
          </div>

          <div class="space-y-2 mt-4">
            <label class="font-bold block mb-2">Minutos de
              tolerancia</label>
            <p-input-number formControlName="late_tolerance" autocomplete="off"/>
          </div>

          <div class="mt-4 flex flex-wrap gap-4">
            <div class="flex items-center">
              <p-radioButton [value]="1" formControlName="is_active"></p-radioButton>
              <label for="ingredient1" class="ml-2">Activo</label>
            </div>
            <div class="flex items-center">
              <p-radioButton [value]="0" formControlName="is_active"></p-radioButton>
              <label for="ingredient2" class="ml-2">Pasivo</label>
            </div>
          </div>
        </div>
        <div class="flex flex-wrap gap-2">
          <p-button type="submit" class="w-max" (click)="onSubmit($event)">
            Guardar Empleado
          </p-button>
          <p-button label="Cancelar" class="w-max" severity="danger" variant="outlined" (click)="onCancel()">
          </p-button>
        </div>
      </form>
    </p-dialog>
  </div>
</section>
