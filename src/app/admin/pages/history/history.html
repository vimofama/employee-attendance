<section class="p-4 bg-gray-50">
  <p-toast/>
  <div class="card bg-white p-6 rounded-xl shadow-sm border border-gray-200">
    <h2 class="font-semibold text-xl mb-4">Resumen</h2>
    <div class="overflow-x-auto">
      <p-table #dt [value]="summary()" [columns]="cols" [showGridlines]="true" [tableStyle]="{'min-width': '50rem'}"
               [loading]="loading()">
        <ng-template #caption class="flex items-center">
          <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-3 w-full">
            <form [formGroup]="form" class="flex flex-wrap items-end gap-2.5">
              <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-gray-700">Horas Base</label>
                <p-inputNumber inputStyleClass="w-14" formControlName="defaultBaseHours"/>
              </div>
              <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-gray-700">Fecha</label>
                <p-datePicker formControlName="date" view="month" dateFormat="mm/yy" placeholder="mm/yy"
                              [readonlyInput]="true" [showIcon]="true" variant="filled" appendTo="body"
                              panelStyleClass="z-50"/>
              </div>
              <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-gray-700">Semanas</label>
                <div class="card flex justify-center">
                  <p-selectbutton [options]="weeksOptions" formControlName="value" [multiple]="true"
                                  optionLabel="name"></p-selectbutton>
                </div>
              </div>
              <p-button icon="pi pi-search" (click)="loadSummary()"/>
            </form>
            <p-button icon="pi pi-upload" label="Export" (click)="exportCSV()" (invalid)="true"/>
          </div>
        </ng-template>
        <ng-template #header>
          <tr class="font-bold">
            <th>Nombre</th>
            <th>Horas</th>
            <th>Horas Extras</th>
            <th>Valor</th>
          </tr>
        </ng-template>
        <ng-template #body let-summary>
          <tr>
            <td>{{ summary.employeeName }}</td>
            <td>{{ summary.horasMes | number: '3.1-2' }}</td>
            <td>{{ summary.horasExtras | number: '2.1-2' }}</td>
            <td>{{ summary.valor | currency }}</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</section>
