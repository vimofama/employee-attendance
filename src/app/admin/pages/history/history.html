<main>
  <p-toast />
  <div class="mt-2">
    <p-table #dt [value]="summary()" [columns]="cols" [tableStyle]="{'min-width': '50rem'}" [loading]="loading()">
      <ng-template #caption class="flex items-center">
        <form [formGroup]="form" class="flex items-center justify-center gap-1">
          <div>
            <label class="mr-2 font-bold">Horas Base</label>
            <p-inputNumber formControlName="defaultBaseHours"/>
          </div>
          <div>
            <label class="mr-2 font-bold">Fecha</label>
            <p-datePicker formControlName="date" view="month" dateFormat="mm/yy"
                          [readonlyInput]="true"/>
          </div>
          <p-button icon="pi pi-search" (click)="loadSummary()"/>
        </form>
        <p-button icon="pi pi-upload" label="Export" (click)="exportCSV()" (invalid)="true" />
      </ng-template>
      <ng-template #header>
        <tr class="font-bold">
          <th>Nombre</th>
          <th>Horas</th>
          <th>Horas Extras</th>
          <th>Valor</th>
        </tr>
      </ng-template>
      <ng-template #body let-summary>
        <tr>
          <td>{{ summary.employeeName }}</td>
          <td>{{ summary.horasMes | number: '3.1-2' }}</td>
          <td>{{ summary.horasExtras | number: '2.1-2' }}</td>
          <td>{{ summary.valor | currency }}</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</main>
