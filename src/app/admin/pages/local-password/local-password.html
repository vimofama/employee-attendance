<p-toast />
<p-confirmDialog />

<div class="card p-6 bg-white rounded-xl shadow-sm border border-gray-100 max-w-md mx-auto mt-10">
  <h2 class="text-xl font-bold text-gray-800 mb-6">Cambiar Contraseña Local</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">

    <div class="flex flex-col gap-2">
      <label for="password" class="font-medium text-gray-700 text-sm">Nueva Contraseña Local</label>
      <p-password
        id="password"
        formControlName="password"
        [toggleMask]="true"
        class="w-full"
        inputStyleClass="w-full p-inputtext-sm"
        placeholder="Contraseña del punto local">
      </p-password>
      @if (form.get('password')?.touched && form.get('password')?.hasError('required')) {
        <small class="text-red-500 text-xs">Campo requerido.</small>
      }
    </div>

    <div class="flex flex-col gap-2">
      <label for="confirmPassword" class="font-medium text-gray-700 text-sm">Repetir Contraseña Local</label>
      <p-password
        id="confirmPassword"
        formControlName="confirmPassword"
        [toggleMask]="true"
        [feedback]="false"
        class="w-full"
        inputStyleClass="w-full p-inputtext-sm"
        placeholder="Confirma la contraseña local">
      </p-password>
      @if (form.get('confirmPassword')?.touched && form.get('confirmPassword')?.hasError('passwordMismatch')) {
        <small class="text-red-500 text-xs font-semibold">Las contraseñas no coinciden.</small>
      }
    </div>

    <p-button
      type="submit"
      label="Actualizar Local"
      icon="pi pi-check"
      severity="info"
      styleClass="w-full mt-2">
    </p-button>
  </form>
</div>
