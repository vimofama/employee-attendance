<p-toast />

<div class="card p-6 bg-white rounded-xl shadow-sm border border-gray-100 max-w-md mx-auto mt-10">
  <div class="flex items-center gap-3 mb-4">
    <div class="p-3 bg-blue-50 text-blue-600 rounded-lg">
      <i class="pi pi-sliders-h text-xl"></i>
    </div>
    <div>
      <h2 class="text-xl font-bold text-gray-800">Configuración del Sistema</h2>
      <p class="text-xs text-gray-500">Ajustes exclusivos para la aplicación de escritorio.</p>
    </div>
  </div>

  <hr class="border-gray-100 my-4" />

  @if (loading()) {
    <div class="flex flex-col items-center justify-center py-6 gap-2 text-gray-400">
      <i class="pi pi-spin pi-spinner text-2xl"></i>
      <span class="text-xs">Sincronizando con el sistema...</span>
    </div>
  } @else {
    <div class="flex items-center justify-between bg-gray-50 p-4 rounded-xl border border-gray-100">
      <div class="flex flex-col gap-0.5 max-w-[75%]">
        <label class="font-semibold text-sm text-gray-700">Arrancar al encender la PC</label>
        <span class="text-xs text-gray-400 leading-normal">
          Permite que el sistema de asistencias se ejecute en segundo plano automáticamente al iniciar sesión.
        </span>
      </div>

      <div class="flex items-center justify-center">
        <p-toggleswitch
          [ngModel]="isAutostartEnabled()"
          (ngModelChange)="onToggleChange($event)" />
      </div>
    </div>
  }
</div>
