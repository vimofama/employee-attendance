<div class="card p-6 bg-white rounded-xl shadow-sm border border-gray-100 max-w-md mx-auto mt-10">
  <div class="flex items-center gap-3 mb-4">
    <div class="p-3 bg-purple-50 text-purple-600 rounded-lg">
      <i class="pi pi-cloud-download text-xl"></i>
    </div>
    <div>
      <h2 class="text-xl font-bold text-gray-800">Sistema de Actualizaciones</h2>
      <p class="text-xs text-gray-500">Administración de versiones de la aplicación de escritorio.</p>
    </div>
  </div>

  <hr class="border-gray-100 my-4" />

  <div class="flex justify-between items-center bg-gray-50 p-4 rounded-xl mb-4 border border-gray-100">
    <span class="text-sm font-medium text-gray-600">Versión instalada:</span>
    <span class="font-mono font-bold text-sm bg-gray-200 text-gray-800 px-2.5 py-0.5 rounded-full">
      v{{ currentVersion() }}
    </span>
  </div>

  <div class="space-y-4">
    @if (!downloading()) {
      <p-button
        label="Buscar Actualizaciones"
        icon="pi pi-refresh"
        class="w-full p-button-primary"
        [loading]="checking()"
        (click)="checkForUpdates(true)">
      </p-button>
    }

    @if (downloading()) {
      <div class="space-y-2 p-2 bg-purple-50 rounded-lg border border-purple-100">
        <div class="flex justify-between text-xs font-semibold text-purple-700 px-1">
          <span>Descargando nuevos archivos...</span>
          <span>{{ downloadProgress() }}%</span>
        </div>
        <p-progress-bar [value]="downloadProgress()" [showValue]="false" styleClass="h-2"></p-progress-bar>
      </div>
    }
  </div>
</div>
