<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-dvh w-full p-3 md:p-6">
  <p-toast/>
  <div class="w-full bg-surface-0 dark:bg-surface-900 py-8 md:py-14 px-4 sm:px-8 md:px-12 rounded-3xl flex flex-col items-center">
    <div class="text-center mb-6 md:mb-8">
      <div class="text-surface-900 dark:text-surface-0 text-2xl md:text-3xl font-medium mb-3 md:mb-4">Bienvenido a
        PABS BURGER
      </div>
      <span class="text-muted-color font-medium">Inicia sesión para continuar</span>
    </div>

    <form [formRoot]="f" class="w-3xs">
      <label for="username" class="block text-surface-900 dark:text-surface-0 text-lg md:text-xl font-medium mb-2">Username</label>
      <input id="username" type="text" placeholder="Username" class="w-full mb-6 md:mb-8 border p-2 rounded"
             [formField]="f.username" autocomplete="off"/>

      <label for="password1" class="block text-surface-900 dark:text-surface-0 font-medium text-lg md:text-xl mb-2">Contraseña</label>
      <input id="password1" type="password" placeholder="Contraseña" class="mb-4 w-full border p-2 rounded"
             [formField]="f.password"/>

      <p-button type="submit" label="Sign In" styleClass="w-full"></p-button>
    </form>
  </div>
</div>
